<svg xmlns="http://www.w3.org/2000/svg" width="210" height="28">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="210" height="28" rx="6" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="28" rx="3" fill="#f4a228"/>

  <!-- Tiger emoji -->
  <text x="14" y="19" font-size="13" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🐯</text>

  <!-- "Powered by" label -->
  <text x="34" y="18"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10"
        fill="#8a8faa"
        letter-spacing="0.3">Powered by</text>

  <!-- "Tiger Studio" label -->
  <text x="96" y="18"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11"
        font-weight="700"
        fill="#f4a228"
        letter-spacing="0.2">Tiger Studio</text>
</svg>
